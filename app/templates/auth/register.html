{% extends "base.html" %}
{% block title %}Регистрация — ClientDesk{% endblock %}
{% block content %}
<div class="max-w-sm mx-auto mt-10">
  <h1 class="text-2xl font-semibold text-slate-900 mb-1">Создать workspace</h1>
  <p class="text-slate-500 mb-6 text-sm">Один аккаунт — одно рабочее пространство агентства.</p>
  <form method="post" action="{{ url_for('auth.register_post') }}" class="space-y-4 bg-white p-6 rounded-xl border border-slate-200">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <div>
      <label class="block text-sm font-medium mb-1">Ваше имя</label>
      <input name="name" required class="w-full rounded-lg border-slate-300 border px-3 py-2 text-sm focus:ring-2 focus:ring-brand focus:border-brand outline-none">
    </div>
    <div>
      <label class="block text-sm font-medium mb-1">Название workspace</label>
      <input name="workspace" placeholder="Например: Studio Nord" class="w-full rounded-lg border-slate-300 border px-3 py-2 text-sm focus:ring-2 focus:ring-brand focus:border-brand outline-none">
    </div>
    <div>
      <label class="block text-sm font-medium mb-1">Email</label>
      <input name="email" type="email" required class="w-full rounded-lg border-slate-300 border px-3 py-2 text-sm focus:ring-2 focus:ring-brand focus:border-brand outline-none">
    </div>
    <div>
      <label class="block text-sm font-medium mb-1">Пароль <span class="text-slate-400">(от 6 символов)</span></label>
      <input name="password" type="password" required class="w-full rounded-lg border-slate-300 border px-3 py-2 text-sm focus:ring-2 focus:ring-brand focus:border-brand outline-none">
    </div>
    <button class="w-full bg-brand hover:bg-brand-dark text-white rounded-lg py-2 text-sm font-medium">Создать</button>
  </form>
  <p class="text-center text-sm text-slate-500 mt-4">
    Уже есть аккаунт? <a href="{{ url_for('auth.login') }}" class="text-brand font-medium">Войти</a>
  </p>
</div>
{% endblock %}
