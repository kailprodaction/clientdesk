{% extends "base.html" %}
{% block title %}Вход — ClientDesk{% endblock %}
{% block content %}
<div class="max-w-sm mx-auto mt-10">
  <h1 class="text-2xl font-semibold text-slate-900 mb-1">С возвращением</h1>
  <p class="text-slate-500 mb-6 text-sm">Войдите в свой workspace.</p>
  <form method="post" action="{% url 'login' %}" class="space-y-4 bg-white p-6 rounded-xl border border-slate-200">
    {% csrf_token %}
    <div>
      <label class="block text-sm font-medium mb-1">Email</label>
      <input name="email" type="email" required class="w-full rounded-lg border-slate-300 border px-3 py-2 text-sm focus:ring-2 focus:ring-brand focus:border-brand outline-none">
    </div>
    <div>
      <label class="block text-sm font-medium mb-1">Пароль</label>
      <input name="password" type="password" required class="w-full rounded-lg border-slate-300 border px-3 py-2 text-sm focus:ring-2 focus:ring-brand focus:border-brand outline-none">
    </div>
    <button class="w-full bg-brand hover:bg-brand-dark text-white rounded-lg py-2 text-sm font-medium">Войти</button>
  </form>
  <p class="text-center text-sm text-slate-500 mt-4">
    Нет аккаунта? <a href="{% url 'register' %}" class="text-brand font-medium">Зарегистрироваться</a>
  </p>
</div>
{% endblock %}
