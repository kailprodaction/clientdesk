<!doctype html>
<html lang="ru" class="h-full">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}ClientDesk{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: {
        colors: { brand: { DEFAULT: '#4f46e5', dark: '#4338ca', light: '#eef2ff' } },
        fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
      }}
    }
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <meta name="csrf-token" content="{{ csrf_token }}">
  <style>[x-cloak]{display:none!important}</style>
</head>
<body class="h-full bg-slate-50 text-slate-800 font-sans antialiased">
  {% if not hide_nav %}
  <header class="bg-white border-b border-slate-200">
    <div class="max-w-6xl mx-auto px-4 h-14 flex items-center justify-between">
      <a href="{% if user.is_authenticated %}{% url 'index' %}{% else %}{% url 'login' %}{% endif %}"
         class="font-semibold text-slate-900 flex items-center gap-2">
        <span class="inline-block w-6 h-6 rounded-md bg-brand"></span> ClientDesk
      </a>
      {% if user.is_authenticated %}
      <div class="flex items-center gap-4 text-sm">
        <span class="text-slate-500">{{ workspace.name }}</span>
        <span class="text-slate-400">·</span>
        <span>{{ user.first_name|default:user.username }}</span>
        <form method="post" action="{% url 'logout' %}">
          {% csrf_token %}
          <button class="text-slate-500 hover:text-brand">Выйти</button>
        </form>
      </div>
      {% endif %}
    </div>
  </header>
  {% endif %}

  <main class="max-w-6xl mx-auto px-4 py-8">
    {% for m in messages %}
    <div class="mb-4 px-4 py-3 rounded-lg text-sm
                {% if m.tags == 'error' %}bg-red-50 text-red-700 border border-red-200
                {% else %}bg-emerald-50 text-emerald-700 border border-emerald-200{% endif %}">
      {{ m }}
    </div>
    {% endfor %}
    {% block content %}{% endblock %}
  </main>
  {% block scripts %}{% endblock %}
</body>
</html>
